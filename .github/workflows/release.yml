name: Publish to PyPI

on:
  push:
    tags:
      - v*

jobs:
  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install project (optional but nice for tests)
        run: uv sync --all-groups

      # Optionally run tests here
      # - name: Run tests
      #   run: uv run pytest

      - name: Build wheel
        run: uv build

      - name: Publish package
        run: uv publish
